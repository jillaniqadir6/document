<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" id="formContainer">
<h2>Student Registration Form</h2>

<form id="regForm">

<div class="form-group">
<label>Roll no :</label>
<input type="text" id="roll">
</div>

<div class="form-group">
<label>Student name :</label>
<div class="name-group">
<input type="text" id="fname" placeholder="First Name">
<input type="text" id="lname" placeholder="Last Name">
</div>
</div>

<div class="form-group">
<label>Father's name :</label>
<input type="text" id="father">
</div>

<div class="form-group">
<label>Date of birth :</label>
<input type="text" class="small-input" placeholder="Day">
<input type="text" class="small-input" placeholder="Month">
<input type="text" class="small-input" placeholder="Year">
</div>

<div class="form-group">
<label>Mobile no :</label>
<input type="text" value="+91" style="width:60px;">
<input type="text" id="mobile">
</div>

<div class="form-group">
<label>Email id :</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Password :</label>
<input type="password" id="password">
</div>

<div class="form-group">
<label>Gender :</label>
<div class="gender-group">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>
</div>

<div class="form-group">
<label>Department :</label>
<div class="dept-group">
<input type="checkbox"> CSE
<input type="checkbox"> IT
<input type="checkbox"> ECE
<input type="checkbox"> Civil
<input type="checkbox"> Mech
</div>
</div>

<div class="form-group">
<label>Course :</label>
<select>
<option value="">Select Course</option>
<option>B.Tech</option>
<option>BCA</option>
<option>B.Sc</option>
<option>M.Tech</option>
<option>MCA</option>
</select>
</div>

<div class="form-group">
<label>Student photo :</label>
<input type="file">
</div>

<div class="form-group">
<label>City :</label>
<input type="text">
</div>

<div class="form-group">
<label>Address :</label>
<textarea rows="3"></textarea>
</div>

<button type="submit">Register</button>
<p class="error" id="errorMsg"></p>

</form>
</div>

<!-- Success Popup -->
<div class="success-card" id="successCard">
<div class="tick">✔</div>
<h3>Thanks for Register!</h3>
<p>Your registration has been submitted successfully.</p>
<button onclick="closeCard()">OK</button>
</div>
<script src="script.js"></script>

</body>
</html>
